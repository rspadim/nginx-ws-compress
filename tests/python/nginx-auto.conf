worker_processes  1;
error_log  /tmp/nginx-ws-test-error.log;
pid        /tmp/nginx-ws-test.pid;

load_module /usr/local/nginx/modules/ngx_http_ws_deflate_module.so;

events {
    worker_connections  1024;
}

http {
    access_log  /tmp/nginx-ws-test-access.log;

    # Auto-detect: compress all WebSocket connections automatically
    ws_deflate_auto on;
    # Except these paths
    ws_deflate_except /no-compress/;
    ws_deflate_except ~ /legacy/;

    server {
        listen       8092;

        # This location doesn't have ws_deflate — auto mode handles it
        location /ws {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # This location is excluded by prefix
        location /no-compress/ {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # This location is excluded by regex
        location /something/legacy/ {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
