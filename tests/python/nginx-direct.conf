worker_processes  1;
error_log  /tmp/nginx-ws-test/logs/error.log debug;
pid        /tmp/nginx-ws-test.pid;

load_module /usr/local/nginx/modules/ngx_http_ws_deflate_module.so;

events {
    worker_connections  1024;
}

http {
    access_log  /tmp/nginx-ws-test-access.log;

    server {
        listen       8090;

        location /ws {
            ws_deflate_pass http://127.0.0.1:9001/ws;
            ws_deflate on;
            ws_deflate_debug on;
        }

        location /ws_deflate_status {
            ws_deflate_status on;
        }
    }
}
