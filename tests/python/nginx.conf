worker_processes  1;
error_log  /tmp/nginx-ws-test/logs/error.log debug;
pid        /tmp/nginx-ws-test.pid;

load_module /usr/local/nginx/modules/ngx_http_ws_deflate_module.so;

events {
    worker_connections  1024;
}

http {
    access_log  /tmp/nginx-ws-test-access.log;

    server {
        listen       8090;

        location /ws {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            ws_deflate on;
            ws_deflate_compression_level 6;
            ws_deflate_context_takeover on;
        }

        location /ws-binary {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            ws_deflate on;
            ws_deflate_compression_level 6;
            ws_deflate_context_takeover on;
        }

        location /no-compress {
            rewrite ^ /ws break;
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            ws_deflate off;
        }

        location /maxcompress {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            ws_deflate on;
            ws_deflate_max_compress_len 1024;
        }
    }
}
