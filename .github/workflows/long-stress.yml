name: Long Stress Test (manual)

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Test duration in minutes (max 60)'
        required: true
        default: '5'
        type: choice
        options:
          - '5'
          - '10'
          - '30'
          - '60'
      connections:
        description: 'Number of concurrent connections (max 200)'
        required: true
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '25'
          - '50'
          - '100'
          - '200'

env:
  NGINX_VERSION: release-1.31.3

jobs:
  long-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout module
      uses: actions/checkout@v4
      with:
        path: nginx-ws-compress

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git libpcre3-dev libssl-dev \
          autoconf automake libtool pkg-config \
          python3 python3-pip python3-venv curl wget

    - name: Install zlib-ng
      run: |
        git clone --depth 1 --branch develop https://github.com/zlib-ng/zlib-ng.git
        cd zlib-ng
        ./configure --prefix=/usr/local --zlib-compat
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Clone nginx + build module
      run: |
        git clone https://github.com/nginx/nginx.git nginx-src
        cd nginx-src
        git checkout ${{ env.NGINX_VERSION }}
        ./auto/configure \
          --with-compat \
          --with-cc-opt="-I/usr/local/include" \
          --with-ld-opt="-L/usr/local/lib" \
          --add-dynamic-module=../nginx-ws-compress/ngx_http_ws_deflate_module
        make modules -j$(nproc)
        sudo make install
        echo "=== Module built ==="
        ls -la objs/ngx_http_ws_deflate_module.so

    - name: Setup Python venv
      run: |
        cd nginx-ws-compress/tests/python
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run long stress test
      run: |
        cd nginx-ws-compress/tests/python
        source venv/bin/activate
        python3 -u long_stress.py \
          --duration ${{ inputs.duration_minutes }} \
          --connections ${{ inputs.connections }}
      timeout-minutes: 75
