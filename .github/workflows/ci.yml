name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  NGINX_VERSION: release-1.31.3

jobs:
  build-and-test:
    continue-on-error: ${{ false }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
    - name: Checkout module
      uses: actions/checkout@v4
      with:
        path: nginx-ws-compress

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git libpcre3-dev libssl-dev \
          autoconf automake libtool pkg-config \
          python3 python3-pip python3-venv \
          curl wget

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install pcre2 openssl wget curl
        echo "PCRE2_CFLAGS=-I$(brew --prefix pcre2)/include" >> $GITHUB_ENV
        echo "PCRE2_LDFLAGS=-L$(brew --prefix pcre2)/lib" >> $GITHUB_ENV

    - name: Install zlib-ng (Linux)
      if: runner.os == 'Linux'
      run: |
        git clone --depth 1 --branch develop https://github.com/zlib-ng/zlib-ng.git
        cd zlib-ng
        ./configure --prefix=/usr/local --zlib-compat
        make -j$(sysctl -n hw.logicalcpu 2>/dev/null || nproc)
        sudo make install
        sudo ldconfig

    - name: Install zlib-ng (macOS)
      if: runner.os == 'macOS'
      run: |
        git clone --depth 1 --branch develop https://github.com/zlib-ng/zlib-ng.git
        cd zlib-ng
        ./configure --prefix=/usr/local --zlib-compat
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Clone nginx
      run: |
        git clone https://github.com/nginx/nginx.git nginx-src
        cd nginx-src
        git checkout ${{ env.NGINX_VERSION }}

    - name: Configure nginx with module
      run: |
        cd nginx-src
        ./auto/configure \
          --with-compat \
          --with-cc-opt="-I/usr/local/include" \
          --with-ld-opt="-L/usr/local/lib" \
          --add-dynamic-module=../nginx-ws-compress/ngx_http_ws_deflate_module

    - name: Build module
      run: |
        cd nginx-src
        make modules -j$(nproc)
        ls -la objs/ngx_http_ws_deflate_module.so

    - name: Install nginx + module
      run: |
        cd nginx-src
        sudo make install
        echo "nginx binary: $(/usr/local/nginx/sbin/nginx -v 2>&1)"
        echo "module: $(ls -la /usr/local/nginx/modules/ngx_http_ws_deflate_module.so)"

    - name: Run C unit tests (frame parser)
      run: |
        cd nginx-ws-compress/tests/c
        gcc -Wall -Wextra -g \
          -I../../ngx_http_ws_deflate_module \
          -I${{ github.workspace }}/nginx-src/src/core \
          -I${{ github.workspace }}/nginx-src/src/os/unix \
          -I${{ github.workspace }}/nginx-src/objs \
          ${{ runner.os == 'macOS' && env.PCRE2_CFLAGS || '' }} \
          -DNGX_OK=0 -DNGX_AGAIN=-2 -DNGX_ERROR=-1 \
          -o test_frame test_frame.c \
          ../../ngx_http_ws_deflate_module/ngx_http_ws_deflate_frame.c
        ./test_frame

    - name: Run C unit tests (compression)
      run: |
        cd nginx-ws-compress/tests/c
        gcc -Wall -Wextra -g \
          -I../../ngx_http_ws_deflate_module \
          -I${{ github.workspace }}/nginx-src/src/core \
          -I${{ github.workspace }}/nginx-src/src/os/unix \
          -I${{ github.workspace }}/nginx-src/objs \
          ${{ runner.os == 'macOS' && env.PCRE2_CFLAGS || '' }} \
          -DNGX_OK=0 -DNGX_AGAIN=-2 -DNGX_ERROR=-1 \
          -o test_compress test_compress.c \
          ../../ngx_http_ws_deflate_module/ngx_http_ws_deflate_compress.c \
          -lz ${{ runner.os == 'macOS' && '-Wl,-rpath,/usr/local/lib' || '' }}
        ./test_compress

    - name: Setup Python venv
      run: |
        cd nginx-ws-compress/tests/python
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        # Install Playwright browsers (skip for faster CI if needed)
        playwright install chromium 2>/dev/null || true

    - name: Run module disabled tests
      if: runner.os != 'macOS'
      run: |
        cd nginx-ws-compress
        source tests/python/venv/bin/activate
        python -m pytest tests/python/test_module_disabled.py -v --asyncio-mode=auto

    - name: Run roundtrip tests
      if: runner.os != 'macOS'
      run: |
        cd nginx-ws-compress
        source tests/python/venv/bin/activate
        python -m pytest tests/python/test_roundtrip.py -v --asyncio-mode=auto

    - name: Run load test (50 concurrent connections)
      if: runner.os != 'macOS'
      run: |
        cd nginx-ws-compress
        source tests/python/venv/bin/activate
        python -m pytest tests/python/test_load.py -v --asyncio-mode=auto
      continue-on-error: true

    - name: Run memory test (~160MB through nginx)
      if: runner.os != 'macOS'
      run: |
        cd nginx-ws-compress
        source tests/python/venv/bin/activate
        python -m pytest tests/python/test_memory.py -v --asyncio-mode=auto -s
      continue-on-error: true
      timeout-minutes: 5

    - name: Run browser test (Playwright)
      if: runner.os != 'macOS'
      run: |
        cd nginx-ws-compress
        source tests/python/venv/bin/activate
        python -m pytest tests/python/test_browser.py -v --asyncio-mode=auto
      continue-on-error: true

  # Minimal build-only job for quick feedback
  build-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout module
      uses: actions/checkout@v4
      with:
        path: nginx-ws-compress

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libpcre3-dev libssl-dev

    - name: Install zlib-ng
      run: |
        git clone --depth 1 --branch develop https://github.com/zlib-ng/zlib-ng.git
        cd zlib-ng
        ./configure --prefix=/usr/local --zlib-compat
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Clone nginx + build module
      run: |
        git clone https://github.com/nginx/nginx.git nginx-src
        cd nginx-src
        git checkout ${{ env.NGINX_VERSION }}
        ./auto/configure \
          --with-compat \
          --with-cc-opt="-I/usr/local/include" \
          --with-ld-opt="-L/usr/local/lib" \
          --add-dynamic-module=../nginx-ws-compress/ngx_http_ws_deflate_module
        make modules -j$(nproc)
        echo "=== Module built ==="
        ls -la objs/ngx_http_ws_deflate_module.so
        file objs/ngx_http_ws_deflate_module.so

  # Windows build (MSYS2)
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout module
      uses: actions/checkout@v4
      with:
        path: nginx-ws-compress

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          make
          gcc
          perl
          pcre2-devel
          zlib-devel

    - name: Build nginx + module
      run: |
        git clone https://github.com/nginx/nginx.git nginx-src
        cd nginx-src
        git checkout release-1.31.3
        ./auto/configure \
          --with-cc=gcc \
          --with-cc-opt="-I/usr/include" \
          --with-ld-opt="-L/usr/lib" \
          --add-module=../nginx-ws-compress/ngx_http_ws_deflate_module
        make -j$(nproc)
        echo === Build complete ===
        ls -la objs/nginx.exe 2>/dev/null || echo "nginx.exe not found"
