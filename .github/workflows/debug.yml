name: Debug Tunnel

on:
  workflow_dispatch:

env:
  NGINX_VERSION: release-1.31.3

jobs:
  debug-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
      with:
        path: nginx-ws-compress

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libpcre3-dev libssl-dev \
          python3 python3-pip python3-venv curl wget

    - name: Install zlib-ng
      run: |
        git clone --depth 1 --branch develop https://github.com/zlib-ng/zlib-ng.git
        cd zlib-ng
        ./configure --prefix=/usr/local --zlib-compat
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build module
      run: |
        git clone https://github.com/nginx/nginx.git nginx-src
        cd nginx-src
        git checkout ${{ env.NGINX_VERSION }}
        ./auto/configure \
          --with-compat --with-debug \
          --with-cc-opt="-I/usr/local/include" \
          --with-ld-opt="-L/usr/local/lib" \
          --add-dynamic-module=../nginx-ws-compress/ngx_http_ws_deflate_module
        make modules -j$(nproc)
        sudo make install

    - name: C unit tests
      run: |
        cd nginx-ws-compress/tests/c
        gcc -Wall -Wextra -g -I../../ngx_http_ws_deflate_module \
          -I${{ github.workspace }}/nginx-src/src/core \
          -I${{ github.workspace }}/nginx-src/objs \
          -DNGX_OK=0 -DNGX_AGAIN=-2 -DNGX_ERROR=-1 \
          -o test_frame test_frame.c \
          ../../ngx_http_ws_deflate_module/ngx_http_ws_deflate_frame.c
        ./test_frame
        gcc -Wall -Wextra -g -I../../ngx_http_ws_deflate_module \
          -I${{ github.workspace }}/nginx-src/src/core \
          -I${{ github.workspace }}/nginx-src/objs \
          -DNGX_OK=0 -DNGX_AGAIN=-2 -DNGX_ERROR=-1 \
          -o test_compress test_compress.c \
          ../../ngx_http_ws_deflate_module/ngx_http_ws_deflate_compress.c -lz
        ./test_compress

    - name: Python setup
      run: |
        cd nginx-ws-compress/tests/python
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run test with full log
      run: |
        cd nginx-ws-compress/tests/python
        source venv/bin/activate
        python -m uvicorn ws_backend:app --host 127.0.0.1 --port 9001 &
        sleep 2
        mkdir -p /tmp/nginx-ws-test/logs
        /usr/local/nginx/sbin/nginx -c nginx.conf -p /tmp/nginx-ws-test
        sleep 1
        
        echo "=== PYTEST ==="
        python -m pytest test_compression_active.py -v -s 2>&1 || true
        
        echo "=== FULL NGINX LOG ==="
        cat /tmp/nginx-ws-test/logs/error.log 2>/dev/null || echo "(no log)"
        
        echo "=== DONE ==="
